<div class="login-card">
  <h2>Iniciar Sesión</h2>
 <p class="subtitle">Ingresa tus credenciales para continuar</p>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="email">Correo Electrónico</label>
      <input
        type="email"
        id="email"
        formControlName="email"
        placeholder="tu@email.com"
        [class.error]="email?.invalid && email?.touched"
      />
      <div class="error-message" *ngIf="email?.invalid && email?.touched">
        <span *ngIf="email?.errors?.['required']">El correo es requerido</span>
        <span *ngIf="email?.errors?.['email']">Correo inválido</span>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <div class="password-input">
        <input
          [type]="showPassword ? 'text' : 'password'"
          id="password"
          formControlName="password"
          placeholder="••••••••"
          [class.error]="password?.invalid && password?.touched"
        />
        <button
          type="button"
          class="toggle-password"
          (click)="togglePassword()"
        >
          {{ showPassword ? '👁️' : '👁️‍🗨️' }}
        </button>
      </div>
      <div class="error-message" *ngIf="password?.invalid && password?.touched">
        <span *ngIf="password?.errors?.['required']">La contraseña es requerida</span>
        <span *ngIf="password?.errors?.['minlength']">Mínimo 8 caracteres</span>
      </div>
    </div>

    <button
      type="submit"
      class="btn btn-primary btn-block"
      [disabled]="isLoading"
    >
      {{ isLoading ? 'Iniciando sesión...' : 'Iniciar Sesión' }}
    </button>
  </form>
  
</div>
