version: '3.8'

services:
  # =====================================================
  # PostgreSQL Database
  # =====================================================
  postgres:
    image: postgres:16-alpine
    container_name: sales-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-sales_system}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=es_EC.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./DB-VENTA.txt:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./migration-secure-admin.sql:/docker-entrypoint-initdb.d/02-secure-admin.sql:ro
    ports:
      - "5432:5432"
    networks:
      - sales-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-sales_system}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================================================
  # Redis (Opcional - para sesiones distribuidas)
  # =====================================================
  redis:
    image: redis:7-alpine
    container_name: sales-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    networks:
      - sales-network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================================================
  # Backend Application
  # =====================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: sales-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3000:3000"
    networks:
      - sales-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - /etc/ssl/certs:/etc/ssl/certs:ro  # Certificados SSL del sistema
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =====================================================
  # Nginx Reverse Proxy (Opcional)
  # =====================================================
  nginx:
    image: nginx:alpine
    container_name: sales-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro  # Certificados SSL
      - nginx_cache:/var/cache/nginx
    networks:
      - sales-network
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  sales-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_cache:
    driver: local

# =====================================================
# NOTAS DE USO
# =====================================================
# 
# Iniciar servicios:
#   docker-compose up -d
#
# Ver logs:
#   docker-compose logs -f
#   docker-compose logs -f app
#
# Detener servicios:
#   docker-compose down
#
# Detener y eliminar volúmenes (¡CUIDADO!):
#   docker-compose down -v
#
# Rebuild:
#   docker-compose up -d --build
#
# Ver estado:
#   docker-compose ps
#
# Ejecutar comandos en contenedor:
#   docker-compose exec app sh
#   docker-compose exec postgres psql -U postgres -d sales_system
#
# Backup de BD:
#   docker-compose exec postgres pg_dump -U postgres sales_system | gzip > backup_$(date +%Y%m%d).sql.gz
#
# Restaurar BD:
#   gunzip < backup_20260207.sql.gz | docker-compose exec -T postgres psql -U postgres -d sales_system
#
# =====================================================